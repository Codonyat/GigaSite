services:
  ipfs:
    image: ipfs/kubo:v0.27.0
    ports:
      - "5001:5001"
    volumes:
      - ipfs-data:/data/ipfs

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  graph-node:
    image: graphprotocol/graph-node:latest
    ports:
      - "8000:8000" # GraphQL HTTP
      - "8001:8001" # GraphQL WS
      - "8020:8020" # JSON-RPC (admin)
      - "8030:8030" # Index node status
    depends_on:
      - ipfs
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "megaeth-mainnet:http://host.docker.internal:8545"
      GRAPH_LOG: info

volumes:
  ipfs-data:
  postgres-data:
