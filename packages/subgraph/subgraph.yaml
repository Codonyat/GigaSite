specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GigaVault
    network: megaeth-mainnet
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: Replace with actual contract address
      abi: GigaVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Transaction
        - LotteryDraw
        - AuctionRound
        - Bid
        - User
        - ProtocolStats
        - DailyMetric
      abis:
        - name: GigaVault
          file: ./abis/GigaVault.json
      eventHandlers:
        - event: Minted(indexed address,uint256,uint256,uint256)
          handler: handleMinted
        - event: Redeemed(indexed address,uint256,uint256,uint256)
          handler: handleRedeemed
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: LotteryWon(indexed address,uint256,indexed uint256)
          handler: handleLotteryWon
        - event: PrizeClaimed(indexed address,uint256)
          handler: handlePrizeClaimed
        - event: BeneficiaryFunded(indexed address,uint256,address)
          handler: handleBeneficiaryFunded
        - event: AuctionStarted(indexed uint256,uint256,uint256)
          handler: handleAuctionStarted
        - event: BidPlaced(indexed address,uint256,uint256)
          handler: handleBidPlaced
        - event: BidRefunded(indexed address,uint256)
          handler: handleBidRefunded
        - event: AuctionWon(indexed address,uint256,uint256,indexed uint256)
          handler: handleAuctionWon
        - event: AuctionNoBids(indexed uint256,uint256)
          handler: handleAuctionNoBids
        - event: FeesDistributed(indexed uint256,uint256,uint256)
          handler: handleFeesDistributed
        - event: UnclaimedPrizeExpired(indexed address,uint256,indexed uint256,uint256,bool)
          handler: handleUnclaimedPrizeExpired
        - event: MaxSupplyLocked(uint256)
          handler: handleMaxSupplyLocked
      file: ./src/mapping.ts
